name: MF Data Pipeline — Weekly Refresh

on:
  schedule:
    - cron: "0 1 * * 0"   # Every Sunday 01:00 UTC (06:30 IST)
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force re-fetch all holdings (ignore daily cache)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

# ══════════════════════════════════════════════════════════
# JOB 1 — MAP ISINs  (≤ 22 min)
# Threaded Yahoo search: ~15k ISINs in ~4-5 min with 12 workers.
# Budget = 20 min → saves progress and exits cleanly before timeout.
# ══════════════════════════════════════════════════════════
jobs:
  map-isins:
    name: "Step 1 · Map ISINs → Yahoo symbols"
    runs-on: ubuntu-latest
    timeout-minutes: 22
    env:
      # Fix Node.js 20 deprecation — must be on the job, not global
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PIPELINE_STEP: "map"
      PIPELINE_TIME_BUDGET: "20"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore previously saved mapping — first run fetches all,
      # subsequent runs skip already-known ISINs instantly.
      - name: Restore ISIN mapping cache
        uses: actions/cache@v4
        with:
          path: data/funds_mapped.csv
          key: funds-mapped-${{ runner.os }}-${{ hashFiles('data/AMC.csv') }}
          restore-keys: |
            funds-mapped-${{ runner.os }}-

      - name: Run pipeline — map step
        run: |
          python scripts/pipeline.py \
            --data-dir data \
            --amc-file data/AMC.csv

      - name: Upload mapping artifacts
        uses: actions/upload-artifact@v4
        if: always()   # upload even on partial run so next job can use it
        with:
          name: step1-mapping
          path: |
            data/funds_mapped.csv
            data/final_schemes_master.csv
          retention-days: 2

  # ══════════════════════════════════════════════════════════
  # JOB 2 — NAV download  (≤ 55 min)
  # Downloads NAV history in batches. Skips symbols already
  # present in idcw_fy_output.csv from prior runs.
  # Budget = 50 min → saves and exits before timeout.
  # ══════════════════════════════════════════════════════════
  download-nav:
    name: "Step 2 · Download NAV history"
    runs-on: ubuntu-latest
    timeout-minutes: 55
    needs: map-isins
    if: always() && needs.map-isins.result != 'cancelled'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PIPELINE_STEP: "nav"
      PIPELINE_TIME_BUDGET: "50"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Step 1 artifacts
        uses: actions/download-artifact@v4
        with:
          name: step1-mapping
          path: data/
        continue-on-error: true

      - name: Restore NAV progress cache
        uses: actions/cache@v4
        with:
          path: data/idcw_fy_output.csv
          key: nav-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            nav-${{ runner.os }}-

      - name: Run pipeline — nav step
        run: |
          python scripts/pipeline.py \
            --data-dir data \
            --amc-file data/AMC.csv \
            --batch-size 150 \
            --sleep-min 8 \
            --sleep-max 14

      - name: Upload NAV artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step2-nav
          path: data/idcw_fy_output.csv
          retention-days: 2

  # ══════════════════════════════════════════════════════════
  # JOB 3 — Holdings fetch + commit  (≤ 58 min)
  # Fetches yfinance funds_data per fund. JSON cache means only
  # stale entries (not fetched today) are re-requested.
  # Budget = 50 min → saves and commits before timeout.
  # ══════════════════════════════════════════════════════════
  fetch-holdings:
    name: "Step 3 · Fetch holdings & commit data"
    runs-on: ubuntu-latest
    timeout-minutes: 58
    needs: [map-isins, download-nav]
    if: always() && needs.map-isins.result != 'cancelled'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PIPELINE_STEP: "holdings"
      PIPELINE_TIME_BUDGET: "50"
      PIPELINE_FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Step 1 artifacts
        uses: actions/download-artifact@v4
        with:
          name: step1-mapping
          path: data/
        continue-on-error: true

      - name: Download Step 2 artifacts
        uses: actions/download-artifact@v4
        with:
          name: step2-nav
          path: data/
        continue-on-error: true

      - name: Restore holdings JSON cache
        uses: actions/cache@v4
        with:
          path: data/holdings_cache.json
          key: holdings-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            holdings-${{ runner.os }}-

      - name: Restore output CSVs cache
        uses: actions/cache@v4
        with:
          path: |
            data/holdings_top.csv
            data/holdings_sector.csv
            data/holdings_asset_classes.csv
            data/holdings_mom_changes.csv
            data/conviction_picks.csv
          key: output-csvs-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            output-csvs-${{ runner.os }}-

      - name: Run pipeline — holdings step
        run: |
          python scripts/pipeline.py \
            --data-dir data \
            --amc-file data/AMC.csv

      - name: Commit & push data/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet \
            && echo "No changes to commit." \
            || (git commit -m "data: weekly refresh $(date -u '+%Y-%m-%d')" && git push)

      - name: Upload full data artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mf-data-week-${{ github.run_number }}
          path: data/
          retention-days: 30
