name: MF Data Pipeline — Weekly Refresh

on:
  schedule:
    # Every Sunday at 01:00 UTC (06:30 IST)
    - cron: "0 1 * * 0"
  workflow_dispatch:
    # Also lets you click "Run workflow" manually in GitHub UI
    inputs:
      force_refresh:
        description: "Force re-fetch all holdings (ignore cache)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write   # needed to git-push data files back to the repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # full run can take ~90 min for large fund universe

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore cached holdings JSON (speeds up weekly runs) ────
      - name: Restore holdings cache
        uses: actions/cache@v4
        with:
          path: data/holdings_cache.json
          key: holdings-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            holdings-cache-${{ runner.os }}-

      # ── 5. Run the data pipeline ────────────────────────────────────
      - name: Run weekly data pipeline
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/pipeline.py \
            --data-dir data \
            --amc-file data/AMC.csv \
            $( [ "$FORCE_REFRESH" = "true" ] && echo "--force-refresh" )

      # ── 6. Commit updated data files back to the repo ───────────────
      - name: Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          git diff --cached --quiet && echo "No changes to commit." || (
            git commit -m "chore: weekly data refresh $(date -u '+%Y-%m-%d')"
            git push
          )

      # ── 7. Upload artifacts for easy download ──────────────────────
      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mf-data-${{ github.run_number }}
          path: data/
          retention-days: 30
